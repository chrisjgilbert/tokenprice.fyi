# Provider news feeds polled by ReleaseWatchJob.
# rss: standard RSS/Atom feed URL parsed with Ruby's bundled `rss` lib.
# page_diff: fetch the page and extract <a> hrefs as article URLs (fragile — expect
#            occasional selector maintenance).
sources:
  - name: openai
    type: rss
    url: "https://openai.com/news/rss"

  - name: google_deepmind
    type: rss
    url: "https://blog.google/technology/ai/rss"

  - name: mistral
    type: rss
    url: "https://mistral.ai/news/rss"

  - name: anthropic
    type: page_diff
    url: "https://www.anthropic.com/news"

  - name: deepseek
    type: page_diff
    url: "https://www.deepseek.com/news"

  # meta_ai (https://ai.meta.com/blog/rss) removed: the feed now 404s (Meta's
  # blog dropped RSS entirely — no autodiscoverable replacement found). Meta
  # launches still reach us via the aggregator feeds below and NewsScanJob's HN
  # search. Re-add if/when Meta publishes a working feed again.

  # Launch-focused aggregator newsletters (all publish RSS). These widen the net
  # to providers we don't poll first-party — xAI, Cohere, and the media/retrieval
  # providers — and to provider-exclusive launches that never hit our own feeds
  # (e.g. a Meta-Model-API-only release). Higher volume than the provider blogs;
  # the Claude relevance classifier filters the noise.
  - name: ainews
    type: rss
    url: "https://news.smol.ai/rss.xml"

  - name: latent_space
    type: rss
    url: "https://www.latent.space/feed"

  - name: tldr_ai
    type: rss
    url: "https://tldr.tech/api/rss/ai"

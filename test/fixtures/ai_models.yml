# Two Anthropic-provider models with known slugs, prices, and tiers, on the
# EXISTING anthropic provider so the provider count stays stable. Used by the
# comparison, models-table, and price-catalog tests.
haiku:
  provider: anthropic
  name: Guide Haiku Fixture
  slug: claude-haiku-4-5
  tier: small
  context_window: 200000
  max_output_tokens: 64000
  released_on: 2026-04-01
  status: active
  description: Cheap small-tier model. Name kept distinct from the OpenRouter sync test's "Claude Haiku 4.5" so dedup-by-name stays unaffected.

sonnet:
  provider: anthropic
  name: Guide Sonnet Fixture
  slug: claude-sonnet-4-6
  tier: mid
  context_window: 1000000
  max_output_tokens: 128000
  released_on: 2026-04-01
  status: active
  description: Mid-tier step-up model. Name kept distinct from the sync test's Sonnet rows.
  # A multimodal-input signature (text + image in → text out) so the modality
  # facet, badge, signature line, and API keys have a non-text row to assert on.
  input_modalities:
    - text
    - image
  output_modalities:
    - text

# A directory-class listing: image generation, priced per image (not tracked
# yet) so it has NO price points, yet is still listed via its modality_class.
# modality_class is set explicitly because fixtures bypass the derive callback,
# and the `listed` scope filters on that column in SQL.
image_gen:
  provider: anthropic
  name: Test Image Model
  slug: test-image-model
  tier: mid
  status: active
  source: openrouter
  modality_class: image_generation
  input_modalities:
    - text
  output_modalities:
    - image
  description: Price-less image-generation directory listing.

# A directory-class listing WITH curated native pricing: image generation priced
# per image, its price stored on the model (no price_points, since per-image
# doesn't fit the per-token table). modality_class is set explicitly because
# fixtures bypass the derive callback.
image_priced:
  provider: anthropic
  name: Test Priced Image Model
  slug: test-priced-image-model
  tier: mid
  status: active
  source: manual
  modality_class: image_generation
  input_modalities:
    - text
  output_modalities:
    - image
  pricing_model: per_image
  price_summary: "$0.04 / image"
  price_source: "https://example.com/pricing"
  priced_as_of: 2026-07-01
  description: Image-generation directory listing with curated per-image pricing.

# An embedding-class model: billed per INPUT token with no output tokens (the
# output is a vector). modality_class is set explicitly because fixtures bypass
# the derive callback; `dimensions` is the native output vector size, only
# embeddings set it.
embedding_model:
  provider: anthropic
  name: Test Embedding Model
  slug: test-embedding-model
  tier: small
  status: active
  source: openrouter
  modality_class: embedding
  input_modalities:
    - text
  output_modalities:
    - embedding
  dimensions: 1536
  description: Input-only embedding model — priced per input token, no output rate.

# A speech-to-text (transcription) row: audio in, text out, billed per minute of
# audio. Curated with a numeric native price (native_price_usd/native_price_unit)
# so its $/min column sorts, and NO price_points. modality_class is set explicitly
# because fixtures bypass the derive callback; on the EXISTING anthropic provider
# so the provider count stays stable.
stt_model:
  provider: anthropic
  name: Test Transcribe
  slug: test-transcribe
  tier: small
  status: active
  source: manual
  modality_class: speech_to_text
  input_modalities:
    - audio
  output_modalities:
    - text
  native_price_usd: 0.006
  native_price_unit: "/min"
  description: Audio-in, transcript-out model priced per minute.


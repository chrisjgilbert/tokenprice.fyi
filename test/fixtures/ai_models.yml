# High input, low output: lowest simple (input+output)/2 average in the catalog
# but NOT the cheapest by input price alone (DeepSeek's input is lower). Keeps a
# model in the catalog whose input and average rankings diverge.
lopri_mid:
  provider: deepseek
  name: Lopri Mid
  slug: lopri-mid
  tier: mid
  context_window: 1000000
  max_output_tokens: 128000
  released_on: 2026-03-15
  status: active
  description: High-input, low-output model — lowest simple in+out average, but not the blended-cheapest.

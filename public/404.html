<!doctype html>
<html lang="en">
  <head>
    <!-- This file lives in public/404.html and is served statically (no Rails),
         so everything is inline: no asset pipeline, no webfonts. -->
    <meta charset="utf-8">
    <title>Page not found — tokenprice.fyi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      :root {
        --slate-900: #0f172a;
        --slate-600: #475569;
        --slate-400: #94a3b8;
        --slate-200: #e2e8f0;
        --slate-50:  #f8fafc;
        --indigo-600: #4f46e5;
        --indigo-700: #4338ca;
      }
      html { font-size: 16px; }
      body {
        background: var(--slate-50);
        color: var(--slate-900);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main { width: min(100%, 30rem); text-align: center; }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--slate-900);
        text-decoration: none;
      }
      .brand .fyi { color: var(--indigo-600); }
      .code {
        margin-top: 2.25rem;
        font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--slate-400);
      }
      h1 {
        margin-top: 0.6rem;
        font-size: clamp(26px, 6vw, 34px);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }
      p { margin-top: 0.9rem; color: var(--slate-600); font-size: 15px; }
      .links { margin-top: 2rem; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 10px 20px; border-radius: 11px; font-size: 14px; font-weight: 600;
        text-decoration: none; transition: background .16s ease, color .16s ease;
      }
      .btn-primary { background: var(--indigo-600); color: #fff; }
      .btn-primary:hover { background: var(--indigo-700); }
      .btn-ghost { color: var(--slate-600); border: 1px solid var(--slate-200); background: #fff; }
      .btn-ghost:hover { color: var(--slate-900); }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="/">
        <svg width="30" height="30" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <defs><radialGradient id="bm" cx="32%" cy="24%" r="82%">
            <stop offset="0" stop-color="#8b93ff"/><stop offset="55%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4338ca"/>
          </radialGradient></defs>
          <circle cx="20" cy="20" r="19" fill="url(#bm)"/>
          <circle cx="20" cy="20" r="17.4" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2.6" stroke-dasharray="0.5 3.1" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="14" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="1.4"/>
          <text x="20" y="20.5" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="JetBrains Mono, monospace" font-weight="700" font-size="18.5">$</text>
        </svg>
        <span>tokenprice<span class="fyi">.fyi</span></span>
      </a>

      <div class="code">404 · not found</div>
      <h1>This page doesn't exist</h1>
      <p>The URL may be mistyped or the page may have moved. The prices, however, are still here.</p>

      <div class="links">
        <a class="btn btn-primary" href="/">Back to prices</a>
        <a class="btn btn-ghost" href="/trends">Flagship prices over time</a>
      </div>
    </main>
  </body>
</html>
